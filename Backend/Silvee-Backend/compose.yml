# version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "6789:6789" # for DEBUG=debugpy
      - "4444:4444" # for DEBUG=web-pdb
    volumes:
      - .:/app
    env_file:
      - ./app/.env
    environment:
      - DEBUG # can be empty, debugpy, or pdb
    depends_on:
      - db
    restart: always

  db:
    image: "postgres:15.2"
    env_file:
      - ./app/.env
    restart: always
    ports:
      - "9432:5432"
    volumes:
    # Store the db data on the host machine, not inside the container.
      - ./ecommerce/postgresql:/var/lib/postgresql/data
