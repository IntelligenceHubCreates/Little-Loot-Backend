name: Frontend — Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'final-project/**'
      - '.github/workflows/frontend-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: final-project

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: final-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Deploy to Vercel (production)
        run: |
          npm install --global vercel@latest
          vercel deploy \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --prod \
            --yes \
            --env NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            --env NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
            --env GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --env GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --env BACKEND_URL="${{ secrets.BACKEND_URL }}" \
            --env RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}" \
            --env RAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}" \
            --env NEXT_PUBLIC_RAZORPAY_KEY_ID="${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}"
