name: Backend — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'Backend/Silvee-Backend/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:     # allow manual trigger from GitHub UI

env:
  AWS_REGION:       ap-south-1
  ECR_REPO_NAME:    littleloot-backend
  APP_RUNNER_ARN:   ${{ secrets.APP_RUNNER_SERVICE_ARN }}

jobs:
  test:
    name: Lint & basic checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/Silvee-Backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for syntax errors
        run: python -m py_compile app/main.py

      - name: Ruff lint (if installed)
        run: |
          pip install ruff --quiet || true
          ruff check app/ --select E,F --ignore F401 || true

  build-and-deploy:
    name: Build image → ECR → App Runner
    needs: test
    runs-on: ubuntu-latest

    permissions:
      id-token: write    # needed for OIDC authentication to AWS
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NAME }}"
          echo "image_sha=${IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE}:latest"    >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        working-directory: Backend/Silvee-Backend
        run: |
          docker build \
            --file Dockerfile \
            --tag "${{ steps.meta.outputs.image_sha }}" \
            --tag "${{ steps.meta.outputs.image_latest }}" \
            .

      - name: Push to ECR
        run: |
          docker push "${{ steps.meta.outputs.image_sha }}"
          docker push "${{ steps.meta.outputs.image_latest }}"

      - name: Trigger App Runner deployment
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ env.APP_RUNNER_ARN }}"

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for App Runner deployment to complete (up to 10 min)..."
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ env.APP_RUNNER_ARN }}" \
              --query 'Service.Status' --output text)
            echo "  [${i}/60] Status: ${STATUS}"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Deployment complete!"
              exit 0
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ] || [ "$STATUS" = "DELETED" ]; then
              echo "Deployment FAILED with status: ${STATUS}"
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for deployment"
          exit 1

      - name: Smoke test — health check
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "${{ env.APP_RUNNER_ARN }}" \
            --query 'Service.ServiceUrl' --output text)
          echo "Hitting https://${SERVICE_URL}/healthz"
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "https://${SERVICE_URL}/healthz")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed (HTTP ${HTTP_STATUS})"
          else
            echo "Health check FAILED (HTTP ${HTTP_STATUS})"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Backend deployment failed. Check App Runner logs in CloudWatch."
